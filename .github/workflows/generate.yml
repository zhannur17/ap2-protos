name: Generate Protobuf

on:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Go code
        run: |
          mkdir -p out/payment/v1 out/order/v1
          protoc --go_out=out --go_opt=paths=source_relative \
                 --go-grpc_out=out --go-grpc_opt=paths=source_relative \
                 payment/v1/payment.proto
          protoc --go_out=out --go_opt=paths=source_relative \
                 --go-grpc_out=out --go-grpc_opt=paths=source_relative \
                 order/v1/order.proto

      - name: Push to generated repo
        run: |
          git clone https://zhannur17:${{ secrets.GENERATED_REPO_TOKEN }}@github.com/zhannur17/ap2-generated.git /tmp/ap2-generated
          cp -r out/* /tmp/ap2-generated/
          cd /tmp/ap2-generated
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "chore: regenerate protobuf files"
          git push
